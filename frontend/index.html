<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="AquaSense AI · Proactive Wastewater Compliance Console — predictive ML, autonomous remediation, cryptographic audit ledger, live WebSocket telemetry."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2334d399'%3E%3Cpath d='M12 2c-3 5-6 9-6 13a6 6 0 0 0 12 0c0-4-3-8-6-13z'/%3E%3C/svg%3E"
    />
    <title>AquaSense AI · Compliance Console</title>

    <!-- Tailwind via Play CDN keeps the project structure flat and zero-config. -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet (interactive vector map) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      body {
        background: #09090b;
        color: #e4e4e7;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

      /* Leaflet dark-theme overrides */
      .leaflet-container {
        background: #07090c !important;
        font-family: ui-monospace, monospace;
      }
      .leaflet-control-attribution {
        background: rgba(10, 10, 12, 0.7) !important;
        color: #71717a !important;
      }
      .leaflet-control-attribution a { color: #a1a1aa !important; }
      .leaflet-control-zoom a {
        background: #18181b !important;
        color: #e4e4e7 !important;
        border-color: #27272a !important;
      }
      .leaflet-control-zoom a:hover { background: #27272a !important; }
      .leaflet-popup-content-wrapper,
      .leaflet-popup-tip {
        background: #0a0a0c !important;
        color: #e4e4e7 !important;
        border: 1px solid #27272a !important;
      }
      .aqs-marker-pulse {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
